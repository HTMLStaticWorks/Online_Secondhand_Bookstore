<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">
    <title>Join the Library | Signup | LitLoom</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: var(--bg-color); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px; 
        }
        .signup-card { 
            width: 100%; 
            max-width: 500px; 
            padding: 40px; 
            background: var(--card-bg); 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
    <!-- Top-Right Global Controls -->
    <div class="position-fixed top-0 end-0 p-4 d-flex gap-2" style="z-index: 1000;">
        <button id="theme-toggle-auth" class="btn btn-sm btn-outline-secondary rounded-circle"><i class="bi bi-moon"></i></button>
        <button id="rtl-toggle-auth" class="btn btn-sm btn-outline-secondary">RTL</button>
    </div>

    <div class="signup-card animate__animated animate__fadeInUp">
        
        <div class="text-center mb-5 d-flex justify-content-center">
            <a href="index.html" class="brand-identity">
                <i class="bi bi-book-half"></i>LitLoom
            </a>
        </div>

        <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Create Account</h1>
            <p class="text-muted">Start your literary journey today.</p>
        </div>

        <!-- Main Signup Form -->
        <form class="needs-validation" novalidate>
            <div class="mb-3">
                <label class="form-label fw-bold">First Name</label>
                <input type="text" class="form-control form-control-lg bg-light border-0 px-4" placeholder="Alice" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Last Name</label>
                <input type="text" class="form-control form-control-lg bg-light border-0 px-4" placeholder="Lovelace" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control form-control-lg bg-light border-0 px-4" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">I want to...</label>
                <select class="form-select form-select-lg bg-light border-0 px-4" required>
                    <option value="">Choose role</option>
                    <option>Buy Rare Books</option>
                    <option>Sell My Books</option>
                    <option>Do Both</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" class="form-control form-control-lg bg-light border-0 px-4" placeholder="••••••••" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Confirm Password</label>
                <input type="password" class="form-control form-control-lg bg-light border-0 px-4" placeholder="••••••••" required>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="termsCheck" required>
                    <label class="form-check-label small text-muted" for="termsCheck">
                        I agree to the <a href="#" class="text-decoration-none">Terms and Conditions</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>.
                    </label>
                </div>
            </div>
            
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary btn-lg py-3 rounded-pill fw-bold shadow-sm">Sign Up Now</button>
            </div>
        </form>

        <!-- Social Signup -->
        <div class="text-center mb-4">
             <p class="text-muted small position-relative mb-3">
                 <span class="bg-card px-3 position-relative" style="z-index: 10; background: var(--card-bg);">Or join with</span>
                 <span class="position-absolute top-50 start-0 w-100 border-top" style="z-index: 1;"></span>
             </p>
             <div class="d-flex gap-2 justify-content-center">
                 <button class="btn btn-outline-secondary px-4 py-2 rounded-pill"><i class="bi bi-google text-danger me-1"></i></button>
                 <button class="btn btn-outline-secondary px-4 py-2 rounded-pill"><i class="bi bi-facebook text-primary me-1"></i></button>
             </div>
        </div>

        <!-- Already have account -->
        <div class="text-center">
            <p class="text-muted mb-0">Already a member? <a href="login.html" class="fw-bold text-primary">Login Here</a></p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
